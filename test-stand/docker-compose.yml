services:

  # ── PostgreSQL — хранит шаблоны и шаги для observer-service ────────────────
  postgres:
    image: postgres:16
    container_name: observer-postgres
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Loki — хранит структурированные логи от demo-сервисов ──────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: observer-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Demo-сервис: симулирует распределённые транзакции, пишет JSON-логи ──────
  # Логи отправляются напрямую в Loki через loki4j (без Alloy).
  demo-service:
    build: ./demo-service
    container_name: observer-demo-service
    ports:
      - "8081:8081"
    depends_on:
      loki:
        condition: service_healthy
    environment:
      OBSERVER_SERVICE_URL: http://host.docker.internal:8033
      LOKI_URL: http://loki:3100

volumes:
  postgres_data:
  loki_data:
