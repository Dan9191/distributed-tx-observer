services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: observer-postgres
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: observer-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Observer Service ─────────────────────────────────────────────────────────
  observer-service:
    build:
      context: ..
      dockerfile: observer-service/Dockerfile
    container_name: observer-service
    ports:
      - "8033:8033"
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/rag?currentSchema=observer
      DATASOURCE_NAME: rag_user
      DATASOURCE_PASSWORD: rag_pass
      LOKI_BASE_URL: http://loki:3100
    volumes:
      - ../observer-service/build/libs/observer-service-0.0.1-SNAPSHOT.jar:/app/app.jar
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8033' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Observer Frontend ────────────────────────────────────────────────────────
  observer-frontend:
    build:
      context: ../observer-frontend
      dockerfile: Dockerfile
    container_name: observer-frontend
    ports:
      - "5173:80"
    depends_on:
      observer-service:
        condition: service_healthy
    volumes:
      - ../observer-frontend/dist:/usr/share/nginx/html

  # ── Demo Service ─────────────────────────────────────────────────────────────
  demo-service:
    build:
      context: ..
      dockerfile: demo-service/Dockerfile
    container_name: observer-demo-service
    ports:
      - "8081:8081"
    depends_on:
      loki:
        condition: service_healthy
      observer-service:
        condition: service_healthy
    environment:
      OBSERVER_SERVICE_URL: http://observer-service:8033
      LOKI_URL: http://loki:3100
    volumes:
      - ../demo-service/build/libs/demo-service-0.0.1-SNAPSHOT.jar:/app/app.jar

volumes:
  postgres_data:
  loki_data:
