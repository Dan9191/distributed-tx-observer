# Минимальная конфигурация Loki для локальной разработки.
# Хранит данные на файловой системе контейнера (volume loki_data).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Разрешаем запросы за большой диапазон времени (удобно при локальной разработке)
  max_query_lookback: 168h  # 7 дней
  reject_old_samples: false
